# /etc/dovecot/local.conf — static configuration (runtime config written by start.sh to conf.d/)

log_path = /dev/stdout
log_timestamp = "%b %d %H:%M:%S "
mail_log_prefix = "%s(%u): "
log_debug = category=auth

# Mail storage
mail_driver = maildir
mail_path = /var/mail/domains/%{user}

mail_max_userip_connections = 1000

namespace inbox {
  inbox = yes
}

# Authentication
auth_mechanisms = plain login
auth_allow_cleartext = yes

userdb static {
  fields {
    uid = 5000
    gid = 5000
    home = /var/mail/domains/%{user}
  }
}

# Sieve plugin settings
sieve_max_script_size = 500M
sieve_max_actions = 1024
sieve_max_redirects = 32

# ManageSieve
service managesieve-login {
  inet_listener sieve {
    port = 4190
  }
}
service managesieve {
}

protocol sieve {
  managesieve_max_line_length = 65536
  mail_max_userip_connections = 100
  managesieve_logout_format = bytes=%i/%o
  managesieve_implementation_string = Dovecot Pigeonhole
  managesieve_max_compile_errors = 5
  log_path = /dev/stdout
  info_log_path = /dev/stdout
}

# LDA
quota_full_tempfail = yes
rejection_subject = Rejected: %s
rejection_reason = Your message to <%t> was automatically rejected:%n%r
recipient_delimiter = +
lda_mailbox_autocreate = yes
lda_mailbox_autosubscribe = yes

protocol lda {
  mail_plugins = sieve
}

# LMTP
protocol lmtp {
  mail_plugins = sieve
}

service lmtp {
  inet_listener lmtp {
    port = 24
  }
}

# SASL socket for Postfix
service auth {
  inet_listener sasl {
    port = 12345
  }
}

protocols = imap pop3 lmtp sieve
